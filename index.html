<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- FIRST SCREEN -->
  <div id="auth-screen" class="screen active fade">
    <div class="logo">💰 Budget Buddy</div>
    <button class="primary" onclick="showScreen('signup-screen')">Sign Up</button>
    <p>Already have an account? <span onclick="showScreen('login-screen')">Login</span></p>
  </div>

  <!-- SIGNUP -->
  <div id="signup-screen" class="screen fade">
    <h2>Sign Up</h2>
    <input type="text" id="signup-name" placeholder="Name">
    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Password">
    <button class="primary" onclick="signup()">Create Account</button>
  </div>
<!-- LOGIN -->
  <div id="login-screen" class="screen fade">
    <h2>Login</h2>
    <input type="text" id="login-name" placeholder="Name">
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
  </div>

  <!-- HOME -->
  <div id="home-screen" class="screen fade">
    <header>
      <h1>Budget Buddy</h1>
      <p id="username"></p>
    </header>
    <div class="quote" id="quote"></div>
    <div class="card">
      <h2>Total Balance: ₹<span id="balance">0</span></h2>
      <p>Recent Transactions:</p>
      <ul id="recent-transactions"></ul>
    </div>
    <div class="quick-scroll" id="quick-actions"></div>
  </div>
<!-- TRANSACTIONS -->
  <div id="transactions-screen" class="screen fade">
    <h2>Transactions</h2>
    <select id="filter" onchange="filterTransactions()">
      <option value="all">All</option>
      <option value="day">Day</option>
      <option value="week">Week</option>
      <option value="month">Month</option>
      <option value="year">Year</option>
    </select>
    <ul id="transactions-list"></ul>
  </div>

  <!-- ADD TRANSACTION -->
  <div id="add-screen" class="screen fade">
    <h2>Add Transaction</h2>
    <input type="text" id="t-title" placeholder="Title">
    <input type="number" id="t-amount" placeholder="Amount">
    <div class="toggle">
      <label><input type="radio" name="type" value="income" checked> Income</label>
      <label><input type="radio" name="type" value="expense"> Expense</label>
    </div>
 <input type="text" id="t-category" placeholder="Category">
    <select id="t-person"></select>
    <label><input type="checkbox" id="t-important"> Mark Important</label>
    <input type="date" id="t-date">
    <button class="primary" onclick="addTransaction()">Save</button>
  </div>

  <!-- ACCOUNTS -->
  <div id="accounts-screen" class="screen fade">
    <h2>Accounts</h2>
    <input type="text" id="person-name" placeholder="Add Person">
    <button onclick="addPerson()">Add</button>
    <ul id="persons-list"></ul>
    <h3>Set Total Balance</h3>
    <input type="number" id="set-balance">
    <button onclick="saveBalance()">Save Balance</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings-screen" class="screen fade">
    <h2>Settings</h2>
    <p>Coming soon...</p>
  </div>
<!-- BOTTOM NAVBAR -->
  <nav class="navbar">
    <div onclick="showScreen('home-screen')">🏠</div>
    <div onclick="showScreen('transactions-screen')">📂</div>
    <div class="fab" onclick="showScreen('add-screen')">➕</div>
    <div onclick="showScreen('accounts-screen')">👥</div>
    <div onclick="showScreen('settings-screen')">⚙️</div>
  </nav>

  <script src="script.js"></script>
</body>
</html>
