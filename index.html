<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen" class="screen active fade">
    <h1 class="logo">💰 Budget Buddy</h1>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
    <button class="secondary" onclick="showScreen('signup-screen')">Create account</button>
  </div>

  <!-- SIGNUP -->
  <div id="signup-screen" class="screen fade">
    <h1 class="logo">Create Account</h1>
    <input type="text" id="signup-name" placeholder="Name">
    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Password">
    <button class="primary" onclick="signup()">Sign Up</button>
    <button class="secondary" onclick="showScreen('login-screen')">Back to Login</button>
  </div>

<!-- HOME -->
  <div id="home-screen" class="screen fade">
    <div class="card balance-card">
      <h2>Total Balance: ₹<span id="balance">0</span></h2>
      <button class="edit" onclick="showScreen('balance-screen')">✏️</button>
    </div>
    <div class="grid">
      <div class="card nav-card" onclick="showScreen('transactions-screen')">📂 Transactions</div>
      <div class="card nav-card" onclick="showScreen('tracker-screen')">📊 Expense Tracker</div>
    </div>
    <h3>Recent Transactions</h3>
    <ul id="recent-transactions"></ul>
  </div>

  <!-- TRANSACTIONS -->
  <div id="transactions-screen" class="screen fade">
    <h2>Transactions <button class="star" onclick="showImportant()">⭐</button></h2>
    <button class="primary" onclick="showScreen('add-screen')">Add Transaction</button>
    <ul id="transactions-list"></ul>
    <button class="secondary" onclick="showScreen('home-screen')">⬅ Back</button>
  </div>
<!-- ADD TRANSACTION -->
  <div id="add-screen" class="screen fade">
    <h2>Add Transaction</h2>
    <input type="text" id="t-title" placeholder="Title">
    <input type="number" id="t-amount" placeholder="Amount">
    <select id="t-type"><option value="income">Income</option><option value="expense">Expense</option></select>
    <input type="text" id="t-category" placeholder="Category">
    <label><input type="checkbox" id="t-important"> Mark Important</label>
    <button class="primary" onclick="addTransaction()">Save</button>
    <button class="secondary" onclick="showScreen('transactions-screen')">⬅ Back</button>
  </div>

  <!-- IMPORTANT -->
  <div id="important-screen" class="screen fade">
    <h2>Important Transactions</h2>
    <ul id="important-list"></ul>
    <button class="secondary" onclick="showScreen('transactions-screen')">⬅ Back</button>
  </div>

<!-- BALANCE -->
  <div id="balance-screen" class="screen fade">
    <h2>Edit Balance</h2>
    <input type="number" id="set-balance">
    <button class="primary" onclick="saveBalance()">Save</button>
    <button class="secondary" onclick="showScreen('home-screen')">⬅ Back</button>
  </div>

  <!-- EXPENSE TRACKER -->
  <div id="tracker-screen" class="screen fade">
    <h2>Expense Tracker</h2>
    <div class="card">
      <label>Daily Goal <input type="number" id="goal-daily"></label>
      <div class="progress"><div id="bar-daily"></div></div>
    </div>
    <div class="card">
      <label>Weekly Goal <input type="number" id="goal-weekly"></label>
      <div class="progress"><div id="bar-weekly"></div></div>
    </div>
    <div class="card">
      <label>Monthly Goal <input type="number" id="goal-monthly"></label>
      <div class="progress"><div id="bar-monthly"></div></div>
    </div>
 <div class="card">
      <label>Yearly Goal <input type="number" id="goal-yearly"></label>
      <div class="progress"><div id="bar-yearly"></div></div>
    </div>
    <button class="secondary" onclick="showScreen('home-screen')">⬅ Back</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
